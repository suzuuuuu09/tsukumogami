version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 22
  pre_build:
    on-failure: ABORT
    commands:
      - echo Logging in to Amazon ECR...
      - aws ecr get-login-password --region "$AWS_DEFAULT_REGION" | docker login --username AWS --password-stdin "$AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com"
      - COMMIT_HASH=$(echo "$CODEBUILD_RESOLVED_SOURCE_VERSION" | cut -c 1-7)
      - IMAGE_TAG=${COMMIT_HASH:=latest}
      - echo Using image tag "$IMAGE_TAG"
  build:
    on-failure: ABORT
    commands:
      - echo Building backend image...
      - docker build -f backend/Dockerfile -t "$BACKEND_ECR_URI:$IMAGE_TAG" -t "$BACKEND_ECR_URI:latest" ./backend
      - echo Building frontend static assets...
      - cd frontend
      - npm ci
      - VITE_API_BASE="$FRONTEND_API_BASE" npm run build
      - cd ..
  post_build:
    on-failure: ABORT
    commands:
      - echo Pushing backend image...
      - docker push "$BACKEND_ECR_URI:$IMAGE_TAG"
      - docker push "$BACKEND_ECR_URI:latest"
      - echo Syncing frontend assets to S3...
      - aws s3 sync frontend/dist "s3://$FRONTEND_BUCKET" --delete
      - echo Invalidating CloudFront cache...
      - aws cloudfront create-invalidation --distribution-id "$FRONTEND_DISTRIBUTION_ID" --paths "/*"
      - printf '[{"name":"backend","imageUri":"%s"}]' "$BACKEND_ECR_URI:$IMAGE_TAG" > backend-imagedefinitions.json

artifacts:
  files:
    - backend-imagedefinitions.json
