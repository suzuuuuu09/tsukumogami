name: App Checks

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  frontend-check:
    name: Frontend Check
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

  backend-check:
    name: Backend Check
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install system libraries
        run: sudo apt-get update && sudo apt-get install -y libzbar0

      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Import backend app
        run: |
          python - <<'PY'
          import importlib.util
          from pathlib import Path

          app_path = Path("app.py")
          spec = importlib.util.spec_from_file_location("backend_app", app_path)
          module = importlib.util.module_from_spec(spec)
          assert spec.loader is not None
          spec.loader.exec_module(module)
          assert hasattr(module, "app"), "Flask app was not found"
          print("Backend app imports successfully")
          PY
